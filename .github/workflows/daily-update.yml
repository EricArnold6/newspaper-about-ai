name: Daily AI News Update

on:
  schedule:
    # 01:00 UTC = 09:00 CST (UTC+8)
    - cron: "0 1 * * *"
  workflow_dispatch: {}   # allow manual trigger

permissions:
  contents: write   # needed to commit new data files

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch yesterday's AI news
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/fetch_news.py

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: add AI news summary for $(date -u +%Y-%m-%d)"
          git push
