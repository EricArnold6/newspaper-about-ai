name: Daily AI News Update

on:
  schedule:
    # 01:00 UTC = 09:00 CST (UTC+8) — primary daily run
    - cron: "0 1 * * *"
    # Catch-up runs in case the primary run is missed or fails
    - cron: "0 7 * * *"   # 15:00 CST
    - cron: "0 13 * * *"  # 21:00 CST
  workflow_dispatch:
    inputs:
      date:
        description: '目标日期（YYYY-MM-DD），留空则生成今日版（含昨日新闻）'
        required: false
        default: ''

permissions:
  contents: write   # needed to commit new data files

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch AI news
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python scripts/fetch_news.py --date "${{ github.event.inputs.date }}"
          else
            python scripts/fetch_news.py
            # Backfill: generate data for the last 7 days if missing
            for i in 1 2 3 4 5 6 7; do
              PAST_DATE=$(python3 -c "from datetime import datetime,timedelta,timezone; print((datetime.now(timezone.utc)-timedelta(days=$i)).strftime('%Y-%m-%d'))")
              python scripts/fetch_news.py --date "$PAST_DATE" || echo "[WARN] Backfill for $PAST_DATE failed or found no articles"
            done
          fi

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: add AI news summary for $(date -u +%Y-%m-%d)"
          git push
