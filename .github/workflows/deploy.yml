name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: {}   # allow manual trigger from the Actions tab
  workflow_run:
    workflows: ["Daily AI News Update"]
    types:
      - completed           # re-deploy after daily fetch commits new data

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # When triggered by workflow_run, only deploy if the upstream job succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject workflow dispatch token
        env:
          WORKFLOW_DISPATCH_TOKEN: ${{ secrets.WORKFLOW_DISPATCH_TOKEN }}
        run: |
          python3 - << 'EOF'
          import json, os
          token = os.environ.get('WORKFLOW_DISPATCH_TOKEN', '')
          if token:
              with open('index.html', 'r', encoding='utf-8') as f:
                  content = f.read()
              content = content.replace(
                  'const WORKFLOW_TOKEN = "";',
                  f'const WORKFLOW_TOKEN = {json.dumps(token)};'
              )
              with open('index.html', 'w', encoding='utf-8') as f:
                  f.write(content)
              print("WORKFLOW_DISPATCH_TOKEN injected into index.html")
          else:
              print("No WORKFLOW_DISPATCH_TOKEN secret set; on-demand updates disabled")
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
