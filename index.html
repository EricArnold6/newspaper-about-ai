<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 日报 · 全球人工智能动态</title>
  <style>
    /* ── Reset & Variables (Apple-like Minimalism) ───────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Apple System Colors */
      --bg-color: #fbfbfd;
      --surface-color: #ffffff;
      --text-primary: #1d1d1f;
      --text-secondary: #86868b;
      --text-tertiary: #a1a1a6;
      --accent: #0066cc;
      --accent-hover: #0077ed;
      --border: #d2d2d7;
      --border-light: #e5e5ea;
      
      /* Typography */
      --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
      
      /* Radii */
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-pill: 980px;
    }

    body {
      background: var(--bg-color);
      color: var(--text-primary);
      font-family: var(--font-sans);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Masthead ────────────────────────────────────────────────────── */
    .masthead {
      background: var(--surface-color);
      text-align: center;
      padding: 64px 20px 48px;
      position: relative;
    }
    .masthead-top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 980px;
      margin: 0 auto 32px;
      padding: 0;
    }
    .masthead-kicker {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }
    .lang-toggle {
      background: var(--bg-color);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-pill);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 16px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .lang-toggle:hover {
      background: var(--border-light);
    }
    .masthead-title {
      font-size: clamp(3rem, 8vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1.05;
      margin-bottom: 12px;
    }
    .masthead-subtitle {
      font-size: 1.25rem;
      font-weight: 400;
      color: var(--text-secondary);
      letter-spacing: -0.01em;
      margin-bottom: 24px;
    }
    .masthead-meta {
      font-size: 13px;
      color: var(--text-tertiary);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .masthead-meta .sep { color: var(--border); }

    /* ── Navigation / Date Picker (Glassmorphism) ────────────────────── */
    .date-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(251, 251, 253, 0.8);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(210, 210, 215, 0.5);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .date-bar label {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .date-btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .date-btn {
      background: transparent;
      border: none;
      border-radius: var(--radius-pill);
      padding: 6px 14px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .date-btn:hover { 
      background: rgba(0,0,0,0.05); 
    }
    .date-btn.active {
      background: var(--text-primary);
      color: var(--surface-color);
    }
    .date-picker-input {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      font-family: inherit;
      font-size: 13px;
      color: var(--text-primary);
      background: var(--surface-color);
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .date-picker-input:focus { border-color: var(--accent); }

    /* ── Main layout ─────────────────────────────────────────────────── */
    .page-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* ── Loading / Error states ──────────────────────────────────────── */
    .state-msg {
      text-align: center;
      padding: 100px 20px;
      color: var(--text-secondary);
    }
    .state-msg .icon { font-size: 2.5rem; margin-bottom: 16px; }
    .state-msg h2 { font-size: 1.25rem; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }
    .state-msg p  { font-size: 1rem; }
    .state-msg button {
      margin-top: 24px;
      background: var(--text-primary);
      color: var(--surface-color);
      padding: 10px 24px;
      border-radius: var(--radius-pill);
      font-size: 14px;
    }

    /* ── Edition banner ──────────────────────────────────────────────── */
    .edition-banner {
      display: inline-block;
      background: rgba(0, 102, 204, 0.08);
      color: var(--accent);
      padding: 6px 16px;
      border-radius: var(--radius-pill);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .edition-banner-wrapper { text-align: center; }

    /* ── Cover image ─────────────────────────────────────────────────── */
    .cover-block {
      position: relative;
      height: 340px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      background: var(--border-light);
    }
    .cover-block img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .cover-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 40%);
      display: flex;
      align-items: flex-end;
      padding: 24px 32px;
    }
    .cover-caption {
      font-size: 13px;
      color: rgba(255,255,255,0.9);
      font-weight: 500;
    }

    /* ── Table of Contents ───────────────────────────────────────────── */
    .toc-block {
      background: var(--surface-color);
      border-radius: var(--radius-lg);
      padding: 32px;
      margin-bottom: 48px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
    }
    .toc-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-tertiary);
      margin-bottom: 16px;
    }
    .toc-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
    }
    .toc-list li a {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s ease;
    }
    .toc-list li a:hover { color: var(--accent); }
    .toc-count {
      background: var(--border-light);
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: var(--radius-pill);
    }

    /* ── Sections ───────────────────────────────────────────────────── */
    .section {
      margin-top: 56px;
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-light);
    }
    .section-icon { font-size: 1.5rem; }
    .section-title {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }
    .section-count {
      margin-left: auto;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-tertiary);
    }

    /* ── Article items ───────────────────────────────────────────────── */
    .article-list { display: flex; flex-direction: column; gap: 32px; }

    .article-item {
      display: flex;
      gap: 20px;
    }
    .article-num {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--border);
      min-width: 28px;
      text-align: right;
      user-select: none;
    }

    .article-body { min-width: 0; flex: 1; }

    .article-meta {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .article-source {
      font-weight: 600;
      color: var(--text-primary);
    }
    .article-time { color: var(--text-tertiary); }

    .article-title {
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text-primary);
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }
    .article-title a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .article-title a:hover { color: var(--accent); }

    .article-summary {
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .article-read-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .article-read-link:hover { color: var(--accent-hover); }
    .article-read-link::after { content: "›"; font-size: 18px; line-height: 1; transform: translateY(-1px); }

    /* ── Footer ─────────────────────────────────────────────────────── */
    .site-footer {
      background: var(--surface-color);
      color: var(--text-secondary);
      text-align: center;
      padding: 40px 20px;
      font-size: 12px;
      border-top: 1px solid var(--border-light);
    }
    .site-footer a { color: var(--text-primary); text-decoration: none; font-weight: 500; }
    .site-footer a:hover { text-decoration: underline; }
    .site-footer .sep { color: var(--border); margin: 0 10px; }

    /* ── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .masthead { padding: 48px 16px 32px; }
      .masthead-title { font-size: 2.2rem; }
      .cover-block { height: 220px; border-radius: var(--radius-md); }
      .article-item { gap: 12px; }
      .article-num { font-size: 1rem; min-width: 20px; }
      .toc-block { padding: 24px; }
      .toc-list { flex-direction: column; gap: 12px; }
    }
  </style>
</head>
<body>

<header class="masthead">
  <div class="masthead-top-bar">
    <div class="masthead-kicker" data-i18n="kicker">每日更新 · 全球视野 · 智能未来</div>
    <button class="lang-toggle" id="lang-btn">EN</button>
  </div>
  <h1 class="masthead-title" data-i18n="title">AI 日报</h1>
  <div class="masthead-subtitle" data-i18n="subtitle">全球人工智能产品与技术突破追踪</div>
  <div class="masthead-meta">
    <span id="today-display">加载中…</span>
    <span class="sep">|</span>
    <span data-i18n="meta-schedule">每日北京时间 09:00 自动更新</span>
    <span class="sep">|</span>
    <span data-i18n="meta-sources">数据来源：全球主流科技媒体</span>
  </div>
</header>

<nav class="date-bar" aria-label="日期导航">
  <label data-i18n="date-label">查看日期：</label>
  <div class="date-btn-group" id="date-btn-group" role="group" aria-label="快捷日期选择">
    </div>
  <input
    type="date"
    class="date-picker-input"
    id="date-picker"
    title="选择任意日期"
    aria-label="选择任意日期"
  />
</nav>

<main>
  <div class="page-wrap" id="content">
    <div class="state-msg">
      <div class="icon">⏳</div>
      <h2 data-i18n="loading">正在加载…</h2>
      <p data-i18n="loading-sub">请稍候</p>
    </div>
  </div>
</main>

<footer class="site-footer">
  <p>
    <span data-i18n="footer-title">AI 日报</span>
    <span class="sep">|</span>
    <span data-i18n="footer-source">数据来自公开 RSS/Atom 订阅源</span>
    <span class="sep">|</span>
    <span data-i18n="footer-schedule">每日北京时间 09:00 自动更新</span>
    <span class="sep">|</span>
    <a href="https://github.com/EricArnold6/newspaper-about-ai" target="_blank" rel="noopener">GitHub</a>
  </p>
</footer>

<script>
// ── Constants ───────────────────────────────────────────────────────
const DATA_BASE   = "data/";
const MANIFEST    = DATA_BASE + "manifest.json";
const GITHUB_REPO = "EricArnold6/newspaper-about-ai";

const WORKFLOW_TOKEN = "";

const SECTION_META = {
  product_updates:         { icon: "🚀", label: "产品更新",  labelEn: "Product Updates" },
  technical_breakthroughs: { icon: "🔬", label: "技术突破",  labelEn: "Tech Breakthroughs" },
  interesting_news:        { icon: "✨", label: "趣闻速递",  labelEn: "Interesting News" },
};

// ── i18n strings ─────────────────────────────────────────────────────
const I18N = {
  zh: {
    kicker:          "每日更新 · 全球视野 · 智能未来",
    title:           "AI 日报",
    subtitle:        "全球人工智能产品与技术突破追踪",
    "meta-schedule": "每日北京时间 09:00 自动更新",
    "meta-sources":  "数据来源：全球主流科技媒体",
    "date-label":    "查看日期：",
    loading:         "正在加载…",
    "loading-sub":   "请稍候",
    "footer-title":  "AI 日报",
    "footer-source": "数据来自公开 RSS/Atom 订阅源",
    "footer-schedule": "每日北京时间 09:00 自动更新",
    "edition-of":    (d) => `${formatDisplayZh(d)} 版`,
    "article-count": (n) => `共收录 ${n} 篇原文`,
    "toc-heading":   "目录",
    "read-article":  "阅读原文",
    "no-data-title": (d) => `${formatDisplayZh(d)} 暂无数据`,
    "no-data-body":  "该日期尚未生成 AI 日报，请选择其他日期。",
    "loading-date":  (d) => `正在加载 ${formatDisplayZh(d)} 的内容…`,
    "pending-title": "数据正在生成中",
    "pending-body":  (d, trig, s) => `${formatDisplayZh(d)} 的 AI 日报尚未生成。${trig ? "已触发数据更新，" : "系统将在每日北京时间 09:00 / 15:00 / 21:00 自动更新，"}将在 <strong id="pending-countdown">${s}</strong> 秒后自动检查。`,
    "check-now":     "立即检查",
    "generating-banner": (d) => `⏳ ${formatDisplayZh(d)} 的日报正在生成中，稍后刷新可查看最新版`,
    "close":         "关闭",
    "section-count": (n) => `${n} 篇`,
    "cover-caption": (d) => `封面配图 · ${formatDisplayZh(d)}`,
    "published":     "发布时间：",
  },
  en: {
    kicker:          "Daily Updates · Global View · AI Future",
    title:           "AI Daily",
    subtitle:        "Tracking Global AI Products & Breakthroughs",
    "meta-schedule": "Auto-updated daily at 09:00 CST",
    "meta-sources":  "Sources: Global Tech Media",
    "date-label":    "Edition:",
    loading:         "Loading…",
    "loading-sub":   "Please wait",
    "footer-title":  "AI Daily",
    "footer-source": "Data from public RSS/Atom feeds",
    "footer-schedule": "Auto-updated daily at 09:00 CST",
    "edition-of":    (d) => `Edition · ${formatDisplayEn(d)}`,
    "article-count": (n) => `${n} articles`,
    "toc-heading":   "Contents",
    "read-article":  "Read Article",
    "no-data-title": (d) => `No data for ${formatDisplayEn(d)}`,
    "no-data-body":  "This edition has not been generated yet. Please select another date.",
    "loading-date":  (d) => `Loading ${formatDisplayEn(d)}…`,
    "pending-title": "Data is being generated",
    "pending-body":  (d, trig, s) => `The digest for ${formatDisplayEn(d)} hasn't been generated yet. ${trig ? "Update triggered. " : "Auto-update runs at 09:00 / 15:00 / 21:00 CST. "}Auto-checking in <strong id="pending-countdown">${s}</strong> seconds.`,
    "check-now":     "Check Now",
    "generating-banner": (d) => `⏳ ${formatDisplayEn(d)} digest is being generated. Refresh shortly to view the latest edition.`,
    "close":         "Close",
    "section-count": (n) => `${n} articles`,
    "cover-caption": (d) => `Cover image · ${formatDisplayEn(d)}`,
    "published":     "Published: ",
  },
};

// ── State ────────────────────────────────────────────────────────────
let availableDates = [];
let currentDate   = null;
let lang          = "zh";

// ── Helpers ──────────────────────────────────────────────────────────
function formatDisplayZh(dateStr) {
  if (!dateStr) return "";
  const [y, m, d] = dateStr.split("-");
  return `${y}年${parseInt(m)}月${parseInt(d)}日`;
}

function formatDisplayEn(dateStr) {
  if (!dateStr) return "";
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const [y, m, d] = dateStr.split("-");
  return `${months[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
}

function formatDisplay(dateStr) {
  return lang === "en" ? formatDisplayEn(dateStr) : formatDisplayZh(dateStr);
}

function t(key, ...args) {
  const val = I18N[lang][key];
  if (typeof val === "function") return val(...args);
  return val || key;
}

function todayUTC8() {
  const now = new Date();
  const offset = 8 * 60;   // CST = UTC+8
  const local  = new Date(now.getTime() + (offset - now.getTimezoneOffset()) * 60000);
  return local.toISOString().slice(0, 10);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function formatPublished(isoStr) {
  if (!isoStr) return "";
  try {
    const d = new Date(isoStr);
    if (isNaN(d.getTime())) return "";
    return d.toLocaleString(lang === "en" ? "en-US" : "zh-CN", {
      year: "numeric", month: "short", day: "numeric",
      hour: "2-digit", minute: "2-digit",
      timeZone: "Asia/Shanghai",
    });
  } catch { return ""; }
}

function applyI18n() {
  document.documentElement.lang = lang === "en" ? "en" : "zh-CN";
  document.title = lang === "en" ? "AI Daily · Global AI News" : "AI 日报 · 全球人工智能动态";
  const langBtn = document.getElementById("lang-btn");
  langBtn.textContent = lang === "en" ? "中文" : "EN";
  langBtn.setAttribute("aria-label", lang === "en" ? "Switch to Chinese" : "切换为英文");
  document.querySelector(".date-bar").setAttribute("aria-label",
    lang === "en" ? "Date navigation" : "日期导航");

  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    const val = I18N[lang][key];
    if (val !== undefined) el.textContent = val;
  });

  if (currentDate) loadDate(currentDate);
}

// ── Render helpers ───────────────────────────────────────────────────
function renderArticle(item, index) {
  const pub = formatPublished(item.published || "");
  const urlAttr = item.url ? ` href="${escHtml(item.url)}"` : "";
  const titleHtml = item.url
    ? `<a${urlAttr} target="_blank" rel="noopener noreferrer">${escHtml(item.title)}</a>`
    : escHtml(item.title);

  return `
    <article class="article-item" role="article">
      <div class="article-num" aria-hidden="true">${index}</div>
      <div class="article-body">
        <div class="article-meta">
          <span class="article-source">${escHtml(item.source)}</span>
          ${pub ? `<span class="article-time">${escHtml(pub)}</span>` : ""}
        </div>
        <h3 class="article-title">${titleHtml}</h3>
        ${item.content ? `<div class="article-summary">${escHtml(item.content)}</div>` : ""}
        ${item.url ? `<a class="article-read-link" href="${escHtml(item.url)}" target="_blank" rel="noopener noreferrer">${escHtml(t("read-article"))}</a>` : ""}
      </div>
    </article>`;
}

function getSectionMeta(key, metaOverrides) {
  const base = SECTION_META[key] || { icon: "📌", label: key, labelEn: key };
  if (metaOverrides && metaOverrides[key]) {
    return {
      icon:    metaOverrides[key].icon  || base.icon,
      label:   metaOverrides[key].label || base.label,
      labelEn: base.labelEn,
    };
  }
  return base;
}

function renderSection(key, items, metaOverrides) {
  if (!items || items.length === 0) return "";
  const meta = getSectionMeta(key, metaOverrides);
  const label = lang === "en" ? meta.labelEn : meta.label;
  return `
    <section class="section" id="section-${key}" aria-labelledby="section-hd-${key}">
      <div class="section-header">
        <span class="section-icon" aria-hidden="true">${meta.icon}</span>
        <h2 class="section-title" id="section-hd-${key}">${escHtml(label)}</h2>
        <span class="section-count">${t("section-count", items.length)}</span>
      </div>
      <div class="article-list">${items.map((item, i) => renderArticle(item, i + 1)).join("")}</div>
    </section>`;
}

function renderToc(data) {
  const entries = Object.entries(data.sections || {})
    .filter(([, v]) => v && v.length > 0);
  if (entries.length === 0) return "";

  const items = entries.map(([k, v]) => {
    const meta = getSectionMeta(k, data.sections_meta);
    const label = lang === "en" ? meta.labelEn : meta.label;
    return `<li><a href="#section-${k}">${meta.icon} ${escHtml(label)} <span class="toc-count">${v.length}</span></a></li>`;
  }).join("");

  return `
    <nav class="toc-block" aria-label="${t("toc-heading")}">
      <div class="toc-title">${t("toc-heading")}</div>
      <ul class="toc-list">${items}</ul>
    </nav>`;
}

function renderData(data) {
  const coverUrl = `https://picsum.photos/seed/${data.date}/1000/400`;
  const coverCaption = t("cover-caption", data.date);

  const cover = `
    <div class="cover-block">
      <img src="${coverUrl}" alt="${coverCaption}" loading="lazy" />
      <div class="cover-overlay">
        <span class="cover-caption">${escHtml(coverCaption)}</span>
      </div>
    </div>`;

  const toc = renderToc(data);

  const sections = Object.entries(data.sections || {})
    .map(([k, v]) => renderSection(k, v, data.sections_meta))
    .join("");

  return `
    <div class="edition-banner-wrapper">
      <div class="edition-banner">
        ${escHtml(t("edition-of", data.date))} · ${escHtml(t("article-count", data.article_count || 0))}
      </div>
    </div>
    ${cover}
    ${toc}
    <div id="sections-container">${sections}</div>`;
}

// ── Trigger update workflow via GitHub API (requires WORKFLOW_TOKEN) ─
async function triggerWorkflowUpdate(date = "") {
  if (!WORKFLOW_TOKEN) return false;
  try {
    const res = await fetch(
      `https://api.github.com/repos/${GITHUB_REPO}/actions/workflows/daily-update.yml/dispatches`,
      {
        method: "POST",
        headers: {
          Authorization: `Bearer ${WORKFLOW_TOKEN}`,
          Accept: "application/vnd.github.v3+json",
          "Content-Type": "application/json",
        },
        body: JSON.stringify(date ? { ref: "main", inputs: { date } } : { ref: "main" }),
      }
    );
    return res.status === 204;
  } catch {
    return false;
  }
}

// ── Show today-pending state with auto-refresh ───────────────────────
let _pendingTimer = null;

async function showTodayPending(dateStr) {
  document.getElementById("today-display").textContent = t("edition-of", dateStr);

  const triggered = await triggerWorkflowUpdate(dateStr);
  const content   = document.getElementById("content");

  function renderPending(secondsLeft) {
    content.innerHTML = `
      <div class="state-msg">
        <div class="icon">⏳</div>
        <h2>${escHtml(t("pending-title"))}</h2>
        <p>${t("pending-body", dateStr, triggered, secondsLeft)}</p>
        <button onclick="checkForNewData('${dateStr}')">${escHtml(t("check-now"))}</button>
      </div>`;
  }

  renderPending(30);
  if (_pendingTimer) clearInterval(_pendingTimer);

  let remaining = 30;
  _pendingTimer = setInterval(() => {
    remaining--;
    const el = document.getElementById("pending-countdown");
    if (el) el.textContent = remaining;
    if (remaining <= 0) {
      clearInterval(_pendingTimer);
      _pendingTimer = null;
      checkForNewData(dateStr);
    }
  }, 1000);
}

// ── Check manifest for new data and load if found ────────────────────
async function checkForNewData(dateStr) {
  if (_pendingTimer) { clearInterval(_pendingTimer); _pendingTimer = null; }

  try {
    const res = await fetch(`${MANIFEST}?t=${Date.now()}`);
    if (res.ok) {
      const manifest = await res.json();
      availableDates = (manifest.dates || []).sort().reverse();
      buildDateButtons(availableDates);
    }
  } catch { /* ignore */ }

  if (availableDates.includes(dateStr)) {
    loadDate(dateStr);
  } else {
    showTodayPending(dateStr);
  }
}

// ── Fetch & display ──────────────────────────────────────────────────
async function loadDate(dateStr) {
  currentDate = dateStr;

  document.getElementById("date-picker").value = dateStr;
  document.querySelectorAll(".date-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.date === dateStr);
    btn.setAttribute("aria-pressed", btn.dataset.date === dateStr ? "true" : "false");
  });
  document.getElementById("today-display").textContent = t("edition-of", dateStr);

  const content = document.getElementById("content");
  content.innerHTML = `
    <div class="state-msg">
      <div class="icon">⏳</div>
      <h2>${escHtml(t("loading-date", dateStr))}</h2>
    </div>`;

  try {
    const res = await fetch(`${DATA_BASE}${dateStr}.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    content.innerHTML = renderData(data);
  } catch (err) {
    console.debug(`[loadDate] No data for ${dateStr}:`, err.message);
    showTodayPending(dateStr);
  }
}

// ── Build date buttons ───────────────────────────────────────────────
function buildDateButtons(dates) {
  const container = document.getElementById("date-btn-group");
  container.innerHTML = "";

  const shown = dates.slice(0, 7);
  shown.forEach(d => {
    const btn = document.createElement("button");
    btn.className = "date-btn";
    btn.dataset.date = d;
    btn.setAttribute("role", "radio");
    btn.setAttribute("aria-pressed", "false");
    const [, m, day] = d.split("-");
    btn.textContent = `${parseInt(m)}/${parseInt(day)}`;
    btn.title = formatDisplay(d);
    btn.addEventListener("click", () => loadDate(d));
    container.appendChild(btn);
  });
}

// ── Show a non-blocking banner when today's data is being generated ──
function showTodayGeneratingBanner(dateStr) {
  if (document.getElementById("generating-banner")) return;
  const banner = document.createElement("div");
  banner.id = "generating-banner";
  banner.style.cssText = [
    "background:var(--accent)",
    "color:#fff",
    "text-align:center",
    "padding:10px 20px",
    "font-family:var(--font-sans)",
    "font-size:13px",
    "display:flex",
    "align-items:center",
    "justify-content:center",
    "gap:12px",
  ].join(";");
  banner.innerHTML = `
    <span>${t("generating-banner", dateStr)}</span>
    <button
      onclick="document.getElementById('generating-banner').remove()"
      style="background:rgba(255,255,255,0.2);border:none;color:#fff;padding:4px 12px;
             cursor:pointer;border-radius:12px;font-size:12px;font-family:inherit;flex-shrink:0;font-weight:500;"
    >${t("close")}</button>`;
  document.querySelector(".date-bar").after(banner);
}

// ── Initialise ───────────────────────────────────────────────────────
async function init() {
  const today  = todayUTC8();
  const picker = document.getElementById("date-picker");
  picker.max   = today;

  document.getElementById("lang-btn").addEventListener("click", () => {
    lang = lang === "zh" ? "en" : "zh";
    applyI18n();
  });

  picker.addEventListener("change", () => {
    if (picker.value) loadDate(picker.value);
  });

  try {
    const res  = await fetch(`${MANIFEST}?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const manifest = await res.json();
    availableDates = (manifest.dates || []).sort().reverse();
  } catch {
    availableDates = [];
  }

  buildDateButtons(availableDates);

  if (availableDates.includes(today)) {
    loadDate(today);
  } else {
    triggerWorkflowUpdate();
    if (availableDates.length > 0) {
      loadDate(availableDates[0]);
      showTodayGeneratingBanner(today);
    } else {
      showTodayPending(today);
      document.getElementById("date-picker").value = today;
      document.querySelectorAll(".date-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.date === today);
        btn.setAttribute("aria-pressed", btn.dataset.date === today ? "true" : "false");
      });
    }
  }
}

init();
</script>
