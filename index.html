<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 日报 · 全球人工智能动态</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@400;600;700&family=Merriweather:wght@400;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Variables ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #1a1a1a;
      --ink-light:  #444;
      --ink-muted:  #777;
      --paper:      #fafaf8;
      --paper-warm: #f4f1ea;
      --accent:     #c0392b;
      --accent-2:   #2c3e7a;
      --accent-3:   #27ae60;
      --border:     #d5cfc0;
      --border-light: #e8e4da;
      --card-bg:    #ffffff;
      --toc-bg:     #f8f6f0;
      --cover-overlay: rgba(0,0,0,0.45);
      --font-serif: 'Noto Serif SC', 'Merriweather', 'Georgia', 'SimSun', serif;
      --font-sans:  'Noto Sans SC', 'Source Sans 3', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-serif);
      min-height: 100vh;
      line-height: 1.7;
    }

    /* ── Masthead ────────────────────────────────────────────────────── */
    .masthead {
      background: var(--ink);
      color: #fff;
      text-align: center;
      padding: 32px 20px 22px;
      border-bottom: 4px double var(--accent);
      position: relative;
    }
    .masthead-top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1100px;
      margin: 0 auto 16px;
      padding: 0 4px;
    }
    .masthead-kicker {
      font-family: var(--font-sans);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #999;
    }
    .lang-toggle {
      background: transparent;
      border: 1px solid #666;
      border-radius: 4px;
      color: #ccc;
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }
    .lang-toggle:hover {
      background: rgba(255,255,255,0.1);
      border-color: #aaa;
      color: #fff;
    }
    .masthead-title {
      font-size: clamp(2.6rem, 9vw, 4.8rem);
      font-weight: 700;
      letter-spacing: -1px;
      color: #fff;
      line-height: 1;
      margin-bottom: 8px;
    }
    .masthead-subtitle {
      font-family: var(--font-sans);
      font-size: 13px;
      color: #bbb;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .masthead-rule {
      border: none;
      border-top: 1px solid #444;
      margin: 18px auto 12px;
      width: 80%;
    }
    .masthead-meta {
      font-family: var(--font-sans);
      font-size: 12px;
      color: #888;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .masthead-meta span { white-space: nowrap; }
    .masthead-meta .sep { color: #555; }

    /* ── Navigation / Date Picker ────────────────────────────────────── */
    .date-bar {
      background: var(--paper-warm);
      border-bottom: 2px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .date-bar label {
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--ink-light);
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .date-btn-group {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .date-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 4px 11px;
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--ink-light);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .date-btn:hover { background: var(--border-light); color: var(--ink); }
    .date-btn.active {
      background: var(--accent-2);
      color: #fff;
      border-color: var(--accent-2);
    }
    .date-picker-input {
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 4px 10px;
      font-family: var(--font-sans);
      font-size: 12px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
    }
    .date-picker-input:focus { outline: 2px solid var(--accent-2); }

    /* ── Main layout ─────────────────────────────────────────────────── */
    .page-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    /* ── Loading / Error states ──────────────────────────────────────── */
    .state-msg {
      text-align: center;
      padding: 80px 20px;
      font-family: var(--font-sans);
      color: var(--ink-muted);
    }
    .state-msg .icon { font-size: 3rem; margin-bottom: 14px; }
    .state-msg h2 { font-size: 1.2rem; margin-bottom: 8px; color: var(--ink-light); }
    .state-msg p  { font-size: 0.9rem; line-height: 1.7; }

    /* ── Edition banner ──────────────────────────────────────────────── */
    .edition-banner {
      background: var(--accent);
      color: #fff;
      text-align: center;
      padding: 10px 20px;
      font-family: var(--font-sans);
      font-size: 13px;
      letter-spacing: 2px;
      font-weight: 700;
      text-transform: uppercase;
      margin: 0 -20px;
    }

    /* ── Cover image ─────────────────────────────────────────────────── */
    .cover-block {
      position: relative;
      height: 260px;
      overflow: hidden;
      margin: 0 -20px;
    }
    .cover-block img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .cover-overlay {
      position: absolute;
      inset: 0;
      background: var(--cover-overlay);
      display: flex;
      align-items: flex-end;
      padding: 20px 28px;
    }
    .cover-caption {
      font-family: var(--font-sans);
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      font-style: italic;
    }

    /* ── Table of Contents ───────────────────────────────────────────── */
    .toc-block {
      background: var(--toc-bg);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent-2);
      padding: 20px 24px;
      margin: 28px 0;
    }
    .toc-title {
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent-2);
      margin-bottom: 12px;
    }
    .toc-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 20px;
    }
    .toc-list li a {
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--ink-light);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.15s;
    }
    .toc-list li a:hover { color: var(--accent-2); }
    .toc-count {
      background: var(--accent-2);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 10px;
    }

    /* ── Sections ───────────────────────────────────────────────────── */
    .section {
      border-top: 3px solid var(--ink);
      padding: 28px 0 8px;
      margin-top: 8px;
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .section-icon { font-size: 1.4rem; line-height: 1; }
    .section-title {
      font-family: var(--font-sans);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ink);
    }
    .section-count {
      margin-left: auto;
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--ink-muted);
    }

    /* ── Article items ───────────────────────────────────────────────── */
    .article-list { display: flex; flex-direction: column; gap: 0; }

    .article-item {
      display: grid;
      grid-template-columns: 40px 1fr;
      gap: 0 16px;
      padding: 20px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .article-item:last-child { border-bottom: none; }

    .article-num {
      font-family: var(--font-sans);
      font-size: 2rem;
      font-weight: 700;
      color: var(--border);
      line-height: 1;
      padding-top: 4px;
      text-align: right;
      user-select: none;
    }

    .article-body { min-width: 0; }

    .article-meta {
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--ink-muted);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .article-source {
      font-weight: 700;
      color: var(--accent-2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .article-time { color: var(--ink-muted); }

    .article-title {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.45;
      color: var(--ink);
      margin-bottom: 10px;
    }
    .article-title a {
      color: inherit;
      text-decoration: none;
    }
    .article-title a:hover { color: var(--accent-2); text-decoration: underline; }

    .article-summary {
      font-size: 0.9rem;
      line-height: 1.75;
      color: var(--ink-light);
      border-left: 3px solid var(--border);
      padding-left: 14px;
      margin-bottom: 12px;
      font-style: italic;
    }

    .article-read-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 700;
      color: var(--accent-2);
      text-decoration: none;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: color 0.15s;
    }
    .article-read-link:hover { color: var(--accent); text-decoration: underline; }
    .article-read-link::after { content: " →"; }

    /* ── Footer ─────────────────────────────────────────────────────── */
    .site-footer {
      background: var(--ink);
      color: #888;
      text-align: center;
      padding: 24px 20px;
      font-family: var(--font-sans);
      font-size: 12px;
      margin-top: 40px;
      line-height: 1.9;
    }
    .site-footer a { color: #bbb; text-decoration: none; }
    .site-footer a:hover { color: #fff; text-decoration: underline; }
    .site-footer .sep { color: #555; margin: 0 6px; }

    /* ── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .masthead { padding: 20px 14px 16px; }
      .masthead-top-bar { margin-bottom: 10px; }
      .cover-block { height: 180px; }
      .article-item { grid-template-columns: 28px 1fr; gap: 0 10px; }
      .article-num { font-size: 1.4rem; }
      .toc-list { flex-direction: column; gap: 6px; }
    }
  </style>
</head>
<body>

<!-- ══ MASTHEAD ══════════════════════════════════════════════════════ -->
<header class="masthead">
  <div class="masthead-top-bar">
    <div class="masthead-kicker" data-i18n="kicker">每日更新 · 全球视野 · 智能未来</div>
    <button class="lang-toggle" id="lang-btn">EN</button>
  </div>
  <h1 class="masthead-title" data-i18n="title">AI 日报</h1>
  <div class="masthead-subtitle" data-i18n="subtitle">全球人工智能产品与技术突破追踪</div>
  <hr class="masthead-rule" />
  <div class="masthead-meta">
    <span id="today-display">加载中…</span>
    <span class="sep">|</span>
    <span data-i18n="meta-schedule">每日北京时间 09:00 自动更新</span>
    <span class="sep">|</span>
    <span data-i18n="meta-sources">数据来源：全球主流科技媒体</span>
  </div>
</header>

<!-- ══ DATE NAVIGATION ═══════════════════════════════════════════════ -->
<nav class="date-bar" aria-label="日期导航">
  <label data-i18n="date-label">查看日期：</label>
  <div class="date-btn-group" id="date-btn-group" role="group" aria-label="快捷日期选择">
    <!-- Populated by JS -->
  </div>
  <input
    type="date"
    class="date-picker-input"
    id="date-picker"
    title="选择任意日期"
    aria-label="选择任意日期"
  />
</nav>

<!-- ══ MAIN CONTENT ══════════════════════════════════════════════════ -->
<main>
  <div class="page-wrap" id="content">
    <div class="state-msg">
      <div class="icon">⏳</div>
      <h2 data-i18n="loading">正在加载…</h2>
      <p data-i18n="loading-sub">请稍候</p>
    </div>
  </div>
</main>

<!-- ══ FOOTER ════════════════════════════════════════════════════════ -->
<footer class="site-footer">
  <p>
    <span data-i18n="footer-title">AI 日报</span>
    <span class="sep">|</span>
    <span data-i18n="footer-source">数据来自公开 RSS/Atom 订阅源</span>
    <span class="sep">|</span>
    <span data-i18n="footer-schedule">每日北京时间 09:00 自动更新</span>
    <span class="sep">|</span>
    <a href="https://github.com/EricArnold6/newspaper-about-ai" target="_blank" rel="noopener">GitHub</a>
  </p>
</footer>

<script>
// ── Constants ───────────────────────────────────────────────────────
const DATA_BASE   = "data/";
const MANIFEST    = DATA_BASE + "manifest.json";
const GITHUB_REPO = "EricArnold6/newspaper-about-ai";

// Optional: set a fine-grained PAT (Actions:write only) to trigger on-demand updates.
// Leave empty to rely on the scheduled catch-up runs instead.
const WORKFLOW_TOKEN = "";

const SECTION_META = {
  product_updates:         { icon: "🚀", label: "产品更新",  labelEn: "Product Updates" },
  technical_breakthroughs: { icon: "🔬", label: "技术突破",  labelEn: "Tech Breakthroughs" },
  interesting_news:        { icon: "✨", label: "趣闻速递",  labelEn: "Interesting News" },
};

// ── i18n strings ─────────────────────────────────────────────────────
const I18N = {
  zh: {
    kicker:          "每日更新 · 全球视野 · 智能未来",
    title:           "AI 日报",
    subtitle:        "全球人工智能产品与技术突破追踪",
    "meta-schedule": "每日北京时间 09:00 自动更新",
    "meta-sources":  "数据来源：全球主流科技媒体",
    "date-label":    "查看日期：",
    loading:         "正在加载…",
    "loading-sub":   "请稍候",
    "footer-title":  "AI 日报",
    "footer-source": "数据来自公开 RSS/Atom 订阅源",
    "footer-schedule": "每日北京时间 09:00 自动更新",
    "edition-of":    (d) => `${formatDisplayZh(d)} 版`,
    "article-count": (n) => `共收录 ${n} 篇原文`,
    "toc-heading":   "📑 目录",
    "read-article":  "阅读原文",
    "no-data-title": (d) => `${formatDisplayZh(d)} 暂无数据`,
    "no-data-body":  "该日期尚未生成 AI 日报，请选择其他日期。",
    "loading-date":  (d) => `正在加载 ${formatDisplayZh(d)} 的内容…`,
    "pending-title": "今日数据正在生成中",
    "pending-body":  (d, trig, s) => `${formatDisplayZh(d)} 的 AI 日报尚未生成。${trig ? "已触发数据更新，" : "系统将在每日北京时间 09:00 / 15:00 / 21:00 自动更新，"}将在 <strong id="pending-countdown">${s}</strong> 秒后自动检查。`,
    "check-now":     "立即检查",
    "generating-banner": (d) => `⏳ ${formatDisplayZh(d)} 的日报正在生成中，稍后刷新可查看最新版`,
    "close":         "关闭",
    "section-count": (n) => `${n} 篇`,
    "cover-caption": (d) => `📸 ${formatDisplayZh(d)} 配图`,
    "published":     "发布时间：",
  },
  en: {
    kicker:          "Daily Updates · Global View · AI Future",
    title:           "AI Daily",
    subtitle:        "Tracking Global AI Products & Breakthroughs",
    "meta-schedule": "Auto-updated daily at 09:00 CST",
    "meta-sources":  "Sources: Global Tech Media",
    "date-label":    "Edition:",
    loading:         "Loading…",
    "loading-sub":   "Please wait",
    "footer-title":  "AI Daily",
    "footer-source": "Data from public RSS/Atom feeds",
    "footer-schedule": "Auto-updated daily at 09:00 CST",
    "edition-of":    (d) => `Edition · ${formatDisplayEn(d)}`,
    "article-count": (n) => `${n} articles`,
    "toc-heading":   "📑 Contents",
    "read-article":  "Read Article",
    "no-data-title": (d) => `No data for ${formatDisplayEn(d)}`,
    "no-data-body":  "This edition has not been generated yet. Please select another date.",
    "loading-date":  (d) => `Loading ${formatDisplayEn(d)}…`,
    "pending-title": "Today's data is being generated",
    "pending-body":  (d, trig, s) => `The digest for ${formatDisplayEn(d)} hasn't been generated yet. ${trig ? "Update triggered. " : "Auto-update runs at 09:00 / 15:00 / 21:00 CST. "}Auto-checking in <strong id="pending-countdown">${s}</strong> seconds.`,
    "check-now":     "Check Now",
    "generating-banner": (d) => `⏳ ${formatDisplayEn(d)} digest is being generated. Refresh shortly to view the latest edition.`,
    "close":         "Close",
    "section-count": (n) => `${n} articles`,
    "cover-caption": (d) => `📸 Cover image for ${formatDisplayEn(d)}`,
    "published":     "Published: ",
  },
};

// ── State ────────────────────────────────────────────────────────────
let availableDates = [];
let currentDate   = null;
let lang          = "zh";

// ── Helpers ──────────────────────────────────────────────────────────
function formatDisplayZh(dateStr) {
  if (!dateStr) return "";
  const [y, m, d] = dateStr.split("-");
  return `${y}年${parseInt(m)}月${parseInt(d)}日`;
}

function formatDisplayEn(dateStr) {
  if (!dateStr) return "";
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const [y, m, d] = dateStr.split("-");
  return `${months[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
}

function formatDisplay(dateStr) {
  return lang === "en" ? formatDisplayEn(dateStr) : formatDisplayZh(dateStr);
}

function t(key, ...args) {
  const val = I18N[lang][key];
  if (typeof val === "function") return val(...args);
  return val || key;
}

function todayUTC8() {
  const now = new Date();
  const offset = 8 * 60;   // CST = UTC+8
  const local  = new Date(now.getTime() + (offset - now.getTimezoneOffset()) * 60000);
  return local.toISOString().slice(0, 10);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function formatPublished(isoStr) {
  if (!isoStr) return "";
  try {
    const d = new Date(isoStr);
    if (isNaN(d.getTime())) return "";
    return d.toLocaleString(lang === "en" ? "en-US" : "zh-CN", {
      year: "numeric", month: "short", day: "numeric",
      hour: "2-digit", minute: "2-digit",
      timeZone: "Asia/Shanghai",
    });
  } catch { return ""; }
}

function applyI18n() {
  document.documentElement.lang = lang === "en" ? "en" : "zh-CN";
  document.title = lang === "en" ? "AI Daily · Global AI News" : "AI 日报 · 全球人工智能动态";
  const langBtn = document.getElementById("lang-btn");
  langBtn.textContent = lang === "en" ? "中文" : "EN";
  langBtn.setAttribute("aria-label", lang === "en" ? "Switch to Chinese" : "切换为英文");
  document.querySelector(".date-bar").setAttribute("aria-label",
    lang === "en" ? "Date navigation" : "日期导航");

  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    const val = I18N[lang][key];
    if (val !== undefined) el.textContent = val;
  });

  // Re-render current data if loaded
  if (currentDate) loadDate(currentDate);
}

// ── Render helpers ───────────────────────────────────────────────────
function renderArticle(item, index) {
  const pub = formatPublished(item.published || "");
  const urlAttr = item.url ? ` href="${escHtml(item.url)}"` : "";
  const titleHtml = item.url
    ? `<a${urlAttr} target="_blank" rel="noopener noreferrer">${escHtml(item.title)}</a>`
    : escHtml(item.title);

  return `
    <article class="article-item" role="article">
      <div class="article-num" aria-hidden="true">${index}</div>
      <div class="article-body">
        <div class="article-meta">
          <span class="article-source">📰 ${escHtml(item.source)}</span>
          ${pub ? `<span class="article-time">🕒 ${escHtml(pub)}</span>` : ""}
        </div>
        <h3 class="article-title">${titleHtml}</h3>
        ${item.content ? `<blockquote class="article-summary">${escHtml(item.content)}</blockquote>` : ""}
        ${item.url ? `<a class="article-read-link" href="${escHtml(item.url)}" target="_blank" rel="noopener noreferrer">${escHtml(t("read-article"))}</a>` : ""}
      </div>
    </article>`;
}

function getSectionMeta(key, metaOverrides) {
  const base = SECTION_META[key] || { icon: "📌", label: key, labelEn: key };
  if (metaOverrides && metaOverrides[key]) {
    return {
      icon:    metaOverrides[key].icon  || base.icon,
      label:   metaOverrides[key].label || base.label,
      labelEn: base.labelEn,
    };
  }
  return base;
}

function renderSection(key, items, metaOverrides) {
  if (!items || items.length === 0) return "";
  const meta = getSectionMeta(key, metaOverrides);
  const label = lang === "en" ? meta.labelEn : meta.label;
  return `
    <section class="section" id="section-${key}" aria-labelledby="section-hd-${key}">
      <div class="section-header">
        <span class="section-icon" aria-hidden="true">${meta.icon}</span>
        <h2 class="section-title" id="section-hd-${key}">${escHtml(label)}</h2>
        <span class="section-count">${t("section-count", items.length)}</span>
      </div>
      <div class="article-list">${items.map((item, i) => renderArticle(item, i + 1)).join("")}</div>
    </section>`;
}

function renderToc(data) {
  const entries = Object.entries(data.sections || {})
    .filter(([, v]) => v && v.length > 0);
  if (entries.length === 0) return "";

  const items = entries.map(([k, v]) => {
    const meta = getSectionMeta(k, data.sections_meta);
    const label = lang === "en" ? meta.labelEn : meta.label;
    return `<li><a href="#section-${k}">${meta.icon} ${escHtml(label)} <span class="toc-count">${v.length}</span></a></li>`;
  }).join("");

  return `
    <nav class="toc-block" aria-label="${t("toc-heading")}">
      <div class="toc-title">${t("toc-heading")}</div>
      <ul class="toc-list">${items}</ul>
    </nav>`;
}

function renderData(data) {
  const coverUrl = `https://picsum.photos/seed/${data.date}/900/260`;
  const coverCaption = t("cover-caption", data.date);

  const cover = `
    <div class="cover-block">
      <img src="${coverUrl}" alt="${coverCaption}" loading="lazy" />
      <div class="cover-overlay">
        <span class="cover-caption">${escHtml(coverCaption)}</span>
      </div>
    </div>`;

  const toc = renderToc(data);

  const sections = Object.entries(data.sections || {})
    .map(([k, v]) => renderSection(k, v, data.sections_meta))
    .join("");

  return `
    <div class="edition-banner">
      ${escHtml(t("edition-of", data.date))} &nbsp;·&nbsp; ${escHtml(t("article-count", data.article_count || 0))}
    </div>
    ${cover}
    ${toc}
    <div id="sections-container">${sections}</div>`;
}

// ── Trigger update workflow via GitHub API (requires WORKFLOW_TOKEN) ─
async function triggerWorkflowUpdate() {
  if (!WORKFLOW_TOKEN) return false;
  try {
    const res = await fetch(
      `https://api.github.com/repos/${GITHUB_REPO}/actions/workflows/daily-update.yml/dispatches`,
      {
        method: "POST",
        headers: {
          Authorization: `Bearer ${WORKFLOW_TOKEN}`,
          Accept: "application/vnd.github.v3+json",
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ ref: "main" }),
      }
    );
    return res.status === 204;
  } catch {
    return false;
  }
}

// ── Show today-pending state with auto-refresh ───────────────────────
let _pendingTimer = null;

async function showTodayPending(dateStr) {
  document.getElementById("today-display").textContent = t("edition-of", dateStr);

  const triggered = await triggerWorkflowUpdate();
  const content   = document.getElementById("content");

  function renderPending(secondsLeft) {
    content.innerHTML = `
      <div class="state-msg">
        <div class="icon">⏳</div>
        <h2>${escHtml(t("pending-title"))}</h2>
        <p>${t("pending-body", dateStr, triggered, secondsLeft)}</p>
        <p style="margin-top:16px">
          <button class="date-btn" onclick="checkForNewData('${dateStr}')">${escHtml(t("check-now"))}</button>
        </p>
      </div>`;
  }

  renderPending(30);
  if (_pendingTimer) clearInterval(_pendingTimer);

  let remaining = 30;
  _pendingTimer = setInterval(() => {
    remaining--;
    const el = document.getElementById("pending-countdown");
    if (el) el.textContent = remaining;
    if (remaining <= 0) {
      clearInterval(_pendingTimer);
      _pendingTimer = null;
      checkForNewData(dateStr);
    }
  }, 1000);
}

// ── Check manifest for new data and load if found ────────────────────
async function checkForNewData(dateStr) {
  if (_pendingTimer) { clearInterval(_pendingTimer); _pendingTimer = null; }

  try {
    const res = await fetch(`${MANIFEST}?t=${Date.now()}`);
    if (res.ok) {
      const manifest = await res.json();
      availableDates = (manifest.dates || []).sort().reverse();
      buildDateButtons(availableDates);
    }
  } catch { /* ignore */ }

  if (availableDates.includes(dateStr)) {
    loadDate(dateStr);
  } else {
    showTodayPending(dateStr);
  }
}

// ── Fetch & display ──────────────────────────────────────────────────
async function loadDate(dateStr) {
  currentDate = dateStr;

  document.getElementById("date-picker").value = dateStr;
  document.querySelectorAll(".date-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.date === dateStr);
    btn.setAttribute("aria-pressed", btn.dataset.date === dateStr ? "true" : "false");
  });
  document.getElementById("today-display").textContent = t("edition-of", dateStr);

  const content = document.getElementById("content");
  content.innerHTML = `
    <div class="state-msg">
      <div class="icon">⏳</div>
      <h2>${escHtml(t("loading-date", dateStr))}</h2>
    </div>`;

  try {
    const res = await fetch(`${DATA_BASE}${dateStr}.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    content.innerHTML = renderData(data);
  } catch (err) {
    content.innerHTML = `
      <div class="state-msg">
        <div class="icon">📭</div>
        <h2>${escHtml(t("no-data-title", dateStr))}</h2>
        <p>${escHtml(t("no-data-body"))}<br/>(${escHtml(err.message)})</p>
      </div>`;
  }
}

// ── Build date buttons ───────────────────────────────────────────────
function buildDateButtons(dates) {
  const container = document.getElementById("date-btn-group");
  container.innerHTML = "";

  const shown = dates.slice(0, 7);
  shown.forEach(d => {
    const btn = document.createElement("button");
    btn.className = "date-btn";
    btn.dataset.date = d;
    btn.setAttribute("role", "radio");
    btn.setAttribute("aria-pressed", "false");
    const [, m, day] = d.split("-");
    btn.textContent = `${parseInt(m)}/${parseInt(day)}`;
    btn.title = formatDisplay(d);
    btn.addEventListener("click", () => loadDate(d));
    container.appendChild(btn);
  });
}

// ── Show a non-blocking banner when today's data is being generated ──
function showTodayGeneratingBanner(dateStr) {
  if (document.getElementById("generating-banner")) return;
  const banner = document.createElement("div");
  banner.id = "generating-banner";
  banner.style.cssText = [
    "background:var(--accent-2)",
    "color:#fff",
    "text-align:center",
    "padding:10px 20px",
    "font-family:var(--font-sans)",
    "font-size:13px",
    "display:flex",
    "align-items:center",
    "justify-content:center",
    "gap:12px",
  ].join(";");
  banner.innerHTML = `
    <span>${t("generating-banner", dateStr)}</span>
    <button
      onclick="document.getElementById('generating-banner').remove()"
      style="background:none;border:1px solid rgba(255,255,255,0.5);color:#fff;padding:3px 10px;
             cursor:pointer;border-radius:3px;font-size:12px;font-family:inherit;flex-shrink:0"
    >${t("close")}</button>`;
  document.querySelector(".date-bar").after(banner);
}

// ── Language toggle ───────────────────────────────────────────────────
// ── Initialise ───────────────────────────────────────────────────────
async function init() {
  const today  = todayUTC8();
  const picker = document.getElementById("date-picker");
  picker.max   = today;

  document.getElementById("lang-btn").addEventListener("click", () => {
    lang = lang === "zh" ? "en" : "zh";
    applyI18n();
  });

  picker.addEventListener("change", () => {
    if (picker.value) loadDate(picker.value);
  });

  try {
    const res  = await fetch(`${MANIFEST}?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const manifest = await res.json();
    availableDates = (manifest.dates || []).sort().reverse();
  } catch {
    availableDates = [];
  }

  buildDateButtons(availableDates);

  if (availableDates.includes(today)) {
    loadDate(today);
  } else {
    triggerWorkflowUpdate();
    if (availableDates.length > 0) {
      loadDate(availableDates[0]);
      showTodayGeneratingBanner(today);
    } else {
      showTodayPending(today);
      document.getElementById("date-picker").value = today;
      document.querySelectorAll(".date-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.date === today);
        btn.setAttribute("aria-pressed", btn.dataset.date === today ? "true" : "false");
      });
    }
  }
}

init();
</script>
